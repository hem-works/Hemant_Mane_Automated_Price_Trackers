<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Price Tracker</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',Arial, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f6f9;
            padding:30px;
        }

        .container{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:30px;

        }


        .login-container{

            width:100%;

            max-width:500px;

            background:white;

            padding:45px;

            border-radius:18px;

            border:1px solid #ececec;

            box-shadow:0 12px 30px rgba(0,0,0,.12);

            transition:.3s;

        }

        .login-container:hover{

            transform:translateY(-5px);

            box-shadow:0 18px 35px rgba(0,0,0,.18);

        }

        .logo{
            text-align:center;
            margin-bottom:25px;
        }

        .logo h1{

            color:#2e7d32;

            font-size:34px;

            margin-bottom:10px;

        }

        .logo p{

            color:#777;

            font-size:16px;

        }

        .form-group{

            margin-bottom:22px;

        }

        label{

            display:block;

            margin-bottom:8px;

            font-weight:600;

            color:#444;

        }

        input{

            width:100%;

            padding:14px;

            border:1px solid #ddd;

            border-radius:10px;

            font-size:15px;

            transition:.3s;

        }

        input:focus{

            outline:none;

            border-color:#2e7d32;

            box-shadow:0 0 10px rgba(46,125,50,.2);

        }


       .login-btn{

            width:100%;

            padding:14px;

            background:#2e7d32;

            color:white;

            border:none;

            border-radius:10px;

            box-shadow:0 5px 15px rgba(46,125,50,.3);

            cursor:pointer;

            font-size:16px;

            font-weight:bold;

            transition:.3s;

        }

       .login-btn:hover{

            background:#256428;

            transform:translateY(-3px);

            box-shadow:0 10px 20px rgba(46,125,50,.35);

        }

        .links{

            text-align:center;

            margin-top:25px;

        }

        .links a{

            color:#2e7d32;

            text-decoration:none;

            font-weight:600;

            transition:.3s;

        }

        .links a:hover{

            color:#256428;

        }

        .back-home{

            text-align:center;

            margin-top:20px;

        }

        .back-home a{

            text-decoration:none;

            color:#666;

            font-weight:600;

            transition:.3s;

        }

        .back-home a:hover{

            color:#2e7d32;

        }
    </style>
</head>

<body>

<div class="container">

    <div class="login-container">

        <!-- Logo -->

        <div class="logo">

            <h1>📦 Price Tracker</h1>

            <p>Create your account</p>

        </div>

        <!-- Form -->

        <form action="/register" method="POST">

            <div class="form-group">

                <label>Full Name</label>

                <input
                    type="text"
                    name="name"
                    placeholder="Enter your full name"
                    required>

            </div>

            <div class="form-group">

                <label>Email Address</label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Create a password"
                    required>

            </div>

            <div class="form-group">

                <label>Confirm Password</label>

                <input
                    type="password"
                    name="confirm_password"
                    placeholder="Confirm your password"
                    required>

            </div>

            <button type="submit" class="login-btn">

                Create Account

            </button>

        </form>

        <hr style="margin:30px 0;">

        <div class="links">

            <p>

                Already have an account?

                <a href="/login">Login</a>

            </p>

        </div>

        <div class="back-home">

            <a href="/">← Back to Home</a>

        </div>

    </div>

</div>

</body>

</html>
