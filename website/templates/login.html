<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Price Tracker</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',Arial, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f6f9;
            padding:30px;
        }

        .container{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:30px;

        }


        .login-container{

            width:100%;

            max-width:500px;

            background:white;

            padding:45px;

            border-radius:18px;

            border:1px solid #ececec;

            box-shadow:0 12px 30px rgba(0,0,0,.12);

            transition:.3s;

        }

        .login-container:hover{

            transform:translateY(-5px);

            box-shadow:0 18px 35px rgba(0,0,0,.18);

        }

        .logo{
            text-align:center;
            margin-bottom:25px;
        }

        .logo h1{

            color:#2e7d32;

            font-size:34px;

            margin-bottom:10px;

        }

        .logo p{

            color:#777;

            font-size:16px;

        }

        .form-group{

            margin-bottom:22px;

        }

        label{

            display:block;

            margin-bottom:8px;

            font-weight:600;

            color:#444;

        }

        input{

            width:100%;

            padding:14px;

            border:1px solid #ddd;

            border-radius:10px;

            font-size:15px;

            transition:.3s;

        }

        input:focus{

            outline:none;

            border-color:#2e7d32;

            box-shadow:0 0 10px rgba(46,125,50,.2);

        }


       .login-btn{

            width:100%;

            padding:14px;

            background:#2e7d32;

            color:white;

            border:none;

            border-radius:10px;

            box-shadow:0 5px 15px rgba(46,125,50,.3);

            cursor:pointer;

            font-size:16px;

            font-weight:bold;

            transition:.3s;

        }

        .login-btn:hover{

            background:#256428;

            transform:translateY(-2px);

        }



        .message-success{

            padding:14px;

            color:#155724;

            background:#d4edda;

            border-radius:10px;

            margin-bottom:20px;

            text-align:center;

            font-weight:600;

        }
        
        .message-error{

            padding:14px;

            color:#721c24;

            background:#f8d7da;

            border-radius:10px;

            margin-bottom:20px;

            text-align:center;

            font-weight:600;

        }

        .links{

            text-align:center;

            margin-top:25px;

        }

        .links a{

            color:#2e7d32;

            text-decoration:none;

            font-weight:600;

            transition:.3s;

        }

        .links a:hover{
            text-decoration:underline;
        }

        .back-home a{

            text-decoration:none;

            color:#666;

            font-weight:600;

            transition:.3s;

        }

        .back-home a:hover{

            color:#2e7d32;

        }
    </style>
</head>
<body>

<div class="container">

<div class="login-container">

    <div class="logo">
        <h1>📦 Price Tracker</h1>
        <p>Track prices and get alerts</p>
    </div>

    {% if success %}
        <div class="message-success">
            {{ success }}
        </div>
    {% endif %}

    {% if error %}
        <div class="message-error">
            {{ error }}
        </div>
    {% endif %}

    <form action="/login" method="POST">

        <div class="form-group">
            <label>Email Address</label>
            <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input
                type="password"
                name="password"
                placeholder="Enter your password"
                required>
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

    </form>

    <hr style="margin:30px 0;">

    <div class="links">
        <p>
            Don't have an account?
            <a href="/register">Create Account</a>
        </p>
    </div>

    <div class="back-home">
        <a href="/">← Back to Home</a>
    </div>

</div>

</div>

</body>
</html>
