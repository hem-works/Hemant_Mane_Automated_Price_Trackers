<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Amazon Price Tracker</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Arial, sans-serif;
        }

        body{

            background:#f4f6f9;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:30px;

        }

        .container{

            width:100%;

            max-width:750px;

        }

        .card{

            background:white;

            padding:45px;

            border-radius:18px;

            box-shadow:0 12px 30px rgba(0,0,0,.12);

            transition:.3s;

        }

        .card:hover{

            transform:translateY(-5px);

            box-shadow:0 18px 35px rgba(0,0,0,.18);

        }

        h1{

            text-align:center;

            color:#2e7d32;

            font-size:38px;

            margin-bottom:12px;

        }

        .subtitle{

            text-align:center;

            color:#666;

            font-size:17px;

            margin-bottom:35px;

        }

        form{

            display:flex;

            flex-direction:column;

            gap:20px;

        }

        input{

            width:100%;

            padding:15px;

            font-size:16px;

            border:1px solid #ddd;

            border-radius:10px;

            transition:.3s;

        }

        input:focus{

            outline:none;

            border-color:#2e7d32;

            box-shadow:0 0 10px rgba(46,125,50,.20);

        }

        button{

            width:100%;

            padding:15px;

            background:#2e7d32;

            color:white;

            border:none;

            border-radius:10px;

            font-size:17px;

            font-weight:bold;

            cursor:pointer;

            transition:.3s;

        }

        button:hover{

            background:#256428;

            transform:translateY(-2px);

        }

        .error{

            margin-top:20px;

            text-align:center;

            color:#dc3545;

            font-weight:bold;

        }

        .result-card{

            margin-top:35px;

            background:#fafafa;

            border-radius:15px;

            padding:30px;

            text-align:center;

            border:1px solid #eee;

        }

        .result-card h2{

            color:#333;

            margin-bottom:25px;

        }

        .amazon-btn{

            display:block;

            width:100%;

            background:#ff9900;

            color:white;

            text-decoration:none;

            padding:14px;

            border-radius:10px;

            font-weight:bold;

            transition:.3s;

            margin-bottom:25px;

        }

        .amazon-btn:hover{

            background:#e68a00;

        }

        hr{

            margin:25px 0;

            border:none;

            border-top:1px solid #ddd;

        }

        .price-box{

            margin-top:20px;

        }

        .price-box small{

            color:#777;

            font-size:15px;

        }

        .price{

            margin-top:10px;

            font-size:42px;

            color:#2e7d32;

            font-weight:bold;

        }

    </style>

</head>

<body>

<div class="container">

<div class="card">

<h1>

📦 Amazon Price Tracker

</h1>

<p class="subtitle">

Track Amazon product prices instantly and receive alerts when prices drop.

</p>

<form action="/track" method="POST" autocomplete="off">

<input

type="text"

name="url"

placeholder="Paste Amazon Product URL"

required

>

<button type="submit">

🔍 Track Product

</button>

</form>

{% if error %}

<p class="error">

{{ error }}

</p>

{% endif %}

{% if price %}

<div class="result-card">

<h2>

Amazon Product

</h2>

<a

href="{{ url }}"

target="_blank"

class="amazon-btn"

>

🛒 View on Amazon

</a>

<hr>

<div class="price-box">

<small>

Current Price

</small>

<div class="price">

₹{{ price }}

</div>

</div>

</div>

{% endif %}

</div>

</div>

</body>

</html>
