<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product | Price Tracker</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',Arial, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f6f9;
            padding:30px;
        }

        .container{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:30px;

        }


        .login-container{

            width:100%;

            max-width:500px;

            background:white;

            padding:45px;

            border-radius:18px;

            border:1px solid #ececec;

            box-shadow:0 12px 30px rgba(0,0,0,.12);

            transition:.3s;

        }

        .login-container:hover{

            transform:translateY(-5px);

            box-shadow:0 18px 35px rgba(0,0,0,.18);

        }

        .logo{
            text-align:center;
            margin-bottom:25px;
        }

        .logo h1{

            color:#2e7d32;

            font-size:34px;

            margin-bottom:10px;

        }

        .logo p{

            color:#777;

            font-size:16px;

        }

        .message-success{

            background:#d4edda;

            color:#155724;

            padding:14px;

            border-radius:10px;

            margin-bottom:20px;

            text-align:center;

            font-weight:600;

        }

        .message-error{

            background:#f8d7da;

            color:#721c24;

            padding:14px;

            border-radius:10px;

            margin-bottom:20px;

            text-align:center;

            font-weight:600;

        }

        .form-group{

            margin-bottom:22px;

        }

        label{

            display:block;

            margin-bottom:8px;

            font-weight:600;

            color:#444;

        }

        input{

            width:100%;

            padding:14px;

            border:1px solid #ddd;

            border-radius:10px;

            font-size:15px;

            transition:.3s;

        }

        input:focus{

            outline:none;

            border-color:#2e7d32;

            box-shadow:0 0 10px rgba(46,125,50,.2);

        }

        small{

            display:block;

            margin-top:6px;

            font-size:13px;

        }

       .login-btn{

            width:100%;

            padding:15px;

            background:#2e7d32;

            color:white;

            border:none;

            border-radius:10px;

            box-shadow:0 5px 15px rgba(46,125,50,.3);

            cursor:pointer;

            font-size:17px;

            font-weight:bold;

            transition:.3s;

        }

       .login-btn:hover{

            background:#256428;

            transform:translateY(-3px);

            box-shadow:0 10px 20px rgba(46,125,50,.35);

        }

        .links{

            text-align:center;

            margin-top:25px;

        }

        .links a{

            color:#2e7d32;

            text-decoration:none;

            font-weight:600;

            transition:.3s;

        }

        .links a:hover{

            color:#256428;

        }

        .back-home{

            text-align:center;

            margin-top:20px;

        }

        .back-home a{

            text-decoration:none;

            color:#666;

            font-weight:600;

            transition:.3s;

        }

        .back-home a:hover{

            color:#2e7d32;

        }
    </style>
</head>

<body>

<div class="container">

    <div class="login-container">

        <!-- Logo -->

        <div class="logo">

            <h1>📦 Price Tracker</h1>

            <p>Update Product Details</p>

        </div>

        {% if success %}

        <div class="message-success">

            {{ success }}

        </div>

        {% endif %}

        {% if error %}

        <div class="message-error">

            {{ error }}

        </div>

        {% endif %}

        <form method="POST" autocomplete="off">

            <div class="form-group">

                <label>📦 Product Name</label>

                <input
                    type="text"
                    name="product_name"
                    value="{{ product.product_name }}"
                    required>

                <small style="color:#777;">

                    Example: Nike Air Max 270

                </small>

            </div>

            <div class="form-group">

                <label>🔗 Amazon Product URL</label>

                <input
                    type="url"
                    name="url"
                    value="{{ product.url }}"
                    required>

                <small style="color:#777;">

                    Paste the complete Amazon product link.

                </small>

            </div>

            <div class="form-group">

                <label>💰 Target Price</label>

                <input
                    type="number"
                    step="0.01"
                    name="target_price"
                    value="{{ product.target_price }}"
                    required>

                <small style="color:#777;">

                    Update the price at which you want to receive alerts.

                </small>

            </div>

            <button type="submit" class="login-btn">

                💾 Save Changes

            </button>

        </form>

        <hr style="margin:30px 0;">

        <div class="back-home">

            <a href="/dashboard">

                ← Back to Dashboard

            </a>

        </div>

    </div>

</div>

</body>
</html>
